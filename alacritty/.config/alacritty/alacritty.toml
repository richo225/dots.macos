
[env]
TERM = "xterm-256color"

[font]
normal = { family = "CaskaydiaMono Nerd Font Mono", style = "Regular" }
bold = { family = "CaskaydiaMono Nerd Font Mono", style = "Bold" }
italic = { family = "CaskaydiaMono Nerd Font Mono", style = "Italic" }
size = 16

[window]
dynamic_title = true
padding.x = 16
padding.y = 16
decorations = "Buttonless"
opacity = 0.92

[keyboard]
bindings = [
{ key = "F11", action = "ToggleFullscreen" },
{ key = "Return", mods = "Shift", chars = "\r" }
]

# Colours — generated by theme-set, not committed
import = ["~/.config/alacritty/colors.toml"]
